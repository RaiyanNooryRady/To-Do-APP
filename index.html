<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Sumit Saha, Learn with Sumit" />
    <meta name="description" content="We love JavaScript" />
    <title>To Do App</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <section class="container">
        <div class="logo">
            <a href="https://devseller.com" target="_blank"><img src="images/logo.png" alt="Devseller" /></a>
            <h1 id="header" class="header">To-Do App</h1>
        </div>


        <form class="new-task-container box">
            <label for="new-task">Add New Task</label>
            <input type="text" id="new-task" />
            <input type="submit" id="addTask" value="Add Task" />
        </form>
        <div class="task-boxs">
            <div class="todo-list box">
                <h2>Incomplete Tasks</h2>
                <ul id="items">
                    <li class="item">
                        <input type="checkbox" /><label>Demo Task 1</label>
                    </li>
                    <li class="item">
                        <input type="checkbox" /><label>Demo Task 2</label>
                    </li>
                    <li class="item">
                        <input type="checkbox" /><label>Demo Task 3</label>
                    </li>
                </ul>
            </div>
            <!--/todo-list-->

            <div class="complete-list box">
                <h2>Completed Tasks</h2>
                <ul>
                    <li class="item">Demo Task 0 <button class="delete">Delete</button></li>
                    <li class="item">Demo Task 5 <button class="delete">Delete</button></li>
                </ul>
            </div>
            <!--/complete-list-->
        </div>
        <div class="nav-links">
            <a href="index.html">Reset</a>
            <a href="programming-hero.html">Visit Programming Hero</a>
        </div>

    </section>
    <!--/container-->
    <script src="scripts/script.js"></script>
    <!-- <script src="test.js"></script> -->
</body>

</html>
